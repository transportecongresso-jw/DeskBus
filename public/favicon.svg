<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fundo amarelo arredondado -->
  <rect width="32" height="32" rx="7" fill="#fbbf24"/>
  <!-- Corpo do ônibus -->
  <rect x="5" y="10" width="22" height="13" rx="2" fill="#78350f"/>
  <!-- Janela traseira -->
  <rect x="7" y="12" width="8" height="5" rx="1" fill="#fef3c7"/>
  <!-- Para-brisa dianteiro -->
  <rect x="18" y="12" width="7" height="5" rx="1" fill="#fef3c7"/>
  <!-- Roda esquerda -->
  <circle cx="10" cy="24" r="3" fill="#451a03"/>
  <circle cx="10" cy="24" r="1.2" fill="#fbbf24"/>
  <!-- Roda direita -->
  <circle cx="22" cy="24" r="3" fill="#451a03"/>
  <circle cx="22" cy="24" r="1.2" fill="#fbbf24"/>
  <!-- Porta -->
  <rect x="14" y="16" width="3" height="7" rx="0.5" fill="#92400e"/>
  <!-- Farol dianteiro -->
  <rect x="26" y="14" width="2" height="3" rx="0.5" fill="#fef9c3"/>
</svg>
